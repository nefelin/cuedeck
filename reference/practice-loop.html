<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loopstation — practice bookmarks for YouTube</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --ink:#15161a;
    --paper:#eeebe4;
    --paper-dim:#e2ded3;
    --line:#cfc9ba;
    --accent:#ff5a36;
    --accent-dim:#c9421f;
    --tape:#2f4f3e;
    --mono:'JetBrains Mono', monospace;
    --disp:'Space Grotesk', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--disp);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    background-image:repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 3px);
    z-index:1;
  }
  .wrap{
    max-width:1040px;
    margin:0 auto;
    padding:28px 20px 80px;
    position:relative;
    z-index:2;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:22px;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{display:flex; align-items:baseline; gap:10px; cursor:pointer;}
  .brand .mark{
    font-family:var(--mono); font-size:13px;
    background:var(--ink); color:var(--paper);
    padding:3px 7px; letter-spacing:0.04em;
  }
  .brand h1{font-size:22px; margin:0; font-weight:700; letter-spacing:-0.01em;}
  .tagline{
    font-family:var(--mono); font-size:11px; color:#6b6a63;
    letter-spacing:0.03em; text-transform:uppercase;
  }

  .btn{
    font-family:var(--mono); font-size:12px; font-weight:600;
    letter-spacing:0.03em; text-transform:uppercase;
    padding:11px 16px;
    background:var(--ink); color:var(--paper);
    border:1.5px solid var(--ink);
    cursor:pointer;
    transition:transform .08s ease, box-shadow .08s ease;
    white-space:nowrap;
  }
  .btn:hover{transform:translate(-1px,-1px); box-shadow:2px 2px 0 var(--accent);}
  .btn:active{transform:translate(0,0); box-shadow:none;}
  .btn.ghost{background:transparent; color:var(--ink);}
  .btn.accent{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn.accent:hover{box-shadow:2px 2px 0 var(--ink);}
  .btn.tape{background:var(--tape); border-color:var(--tape); color:#fff;}
  .btn.tape:hover{box-shadow:2px 2px 0 var(--ink);}
  .btn:disabled{opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none;}
  .btn.small{padding:7px 10px; font-size:11px;}

  .view{display:none;}
  .view.active{display:block;}

  /* ====================================================== */
  /* LIBRARY VIEW                                            */
  /* ====================================================== */
  .add-bar{
    display:flex; gap:8px; margin-bottom:8px;
  }
  .add-bar input{
    flex:1;
    font-family:var(--mono); font-size:13px;
    padding:11px 12px;
    background:#fff; border:1.5px solid var(--ink); color:var(--ink);
    outline:none;
  }
  .add-bar input::placeholder{color:#9a988e;}
  .add-bar input:focus{box-shadow:2px 2px 0 var(--ink);}
  .add-error{
    font-family:var(--mono); font-size:11px; color:var(--accent-dim);
    margin:0 0 18px; min-height:14px;
  }

  .lib-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-top:28px; margin-bottom:12px;
    border-bottom:2px solid var(--ink); padding-bottom:8px;
  }
  .lib-head h2{
    font-size:14px; margin:0; text-transform:uppercase;
    letter-spacing:0.06em; font-weight:700;
  }
  .lib-count{font-family:var(--mono); font-size:11px; color:#6b6a63;}

  .lib-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:14px;
  }
  .lib-card{
    background:#fff;
    border:1.5px solid var(--ink);
    cursor:pointer;
    position:relative;
    transition:transform .08s ease, box-shadow .08s ease;
    display:flex; flex-direction:column;
  }
  .lib-card:hover{transform:translate(-2px,-2px); box-shadow:3px 3px 0 var(--accent);}
  .lib-thumb{
    width:100%; aspect-ratio:16/9;
    background:var(--ink) center/cover no-repeat;
    position:relative;
    flex-shrink:0;
  }
  .lib-thumb .bm-badge{
    position:absolute; bottom:6px; right:6px;
    font-family:var(--mono); font-size:10px;
    background:var(--accent); color:#fff;
    padding:2px 6px;
  }
  .lib-body{padding:10px 12px 12px; display:flex; flex-direction:column; gap:6px; flex:1;}
  .lib-title{
    font-size:13px; font-weight:600; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .lib-meta{font-family:var(--mono); font-size:10px; color:#9a988e;}
  .lib-actions{
    display:flex; gap:6px; margin-top:auto; padding-top:4px;
  }
  .icon-btn{
    width:26px; height:26px;
    display:flex; align-items:center; justify-content:center;
    background:transparent; border:1.5px solid var(--line);
    cursor:pointer; font-size:12px; color:var(--ink);
    transition:all .1s ease;
  }
  .icon-btn:hover{border-color:var(--ink); background:var(--paper-dim);}
  .icon-btn.danger:hover{border-color:var(--accent); color:var(--accent);}

  .empty-lib{
    font-family:var(--mono); font-size:12px; color:#9a988e;
    padding:40px 20px; text-align:center;
    border:1.5px dashed var(--line);
  }
  .empty-lib .big{
    font-family:var(--disp); font-size:15px; color:var(--ink); font-weight:600;
    margin-bottom:6px;
  }

  /* ====================================================== */
  /* PLAYER VIEW                                              */
  /* ====================================================== */
  .back-row{
    display:flex; align-items:center; gap:10px;
    margin-bottom:14px;
  }
  .back-link{
    font-family:var(--mono); font-size:12px;
    color:var(--ink); cursor:pointer;
    display:flex; align-items:center; gap:5px;
    text-transform:uppercase; letter-spacing:0.03em;
  }
  .back-link:hover{color:var(--accent-dim);}
  .player-title{
    font-size:15px; font-weight:600;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .deck{background:var(--ink); padding:10px; position:relative;}
  .player-frame{position:relative; width:100%; aspect-ratio:16/9; background:#000;}
  .player-frame iframe{position:absolute; inset:0; width:100%; height:100%; border:0;}

  .deck-status{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
    color:#cfc9ba; font-family:var(--mono); font-size:12px;
    text-align:center; padding:20px; background:#000;
  }
  .deck-status .big{font-family:var(--disp); font-size:15px; color:#fff; font-weight:600;}
  .deck-status.is-error .big{color:#ff8a6c;}
  .spinner{
    width:22px; height:22px;
    border:2.5px solid #3a3a3a;
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .deck-status[hidden]{display:none;}

  /* ---------- Transport ---------- */
  .transport{background:var(--ink); padding:14px 12px 16px; color:var(--paper);}
  .scrub-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .timecode{
    font-family:var(--mono); font-size:13px; font-variant-numeric:tabular-nums;
    color:var(--accent); min-width:58px;
  }
  .timecode.dur{color:#9a988e; min-width:58px; text-align:right;}
  .scrub-track{flex:1; position:relative; height:22px; display:flex; align-items:center;}
  .scrub-track input[type=range]{width:100%; appearance:none; -webkit-appearance:none; background:transparent; margin:0; position:relative; z-index:2;}
  .scrub-track input[type=range]::-webkit-slider-runnable-track{height:4px; background:#46453e;}
  .scrub-track input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--accent); margin-top:-4.5px; cursor:pointer; border:2px solid var(--ink);}
  .scrub-track input[type=range]::-moz-range-track{height:4px; background:#46453e;}
  .scrub-track input[type=range]::-moz-range-thumb{width:11px; height:11px; border-radius:50%; background:var(--accent); border:2px solid var(--ink); cursor:pointer;}
  .bookmark-ticks{position:absolute; left:0; right:0; top:50%; height:0; pointer-events:none; z-index:1;}
  .tick{position:absolute; top:-9px; width:2px; height:18px; background:var(--tape); opacity:0.85;}
  .tick.active-loop{background:var(--accent);}

  .transport-controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .transport-controls .group{display:flex; gap:6px;}
  .spacer{flex:1;}
  .speed-select{
    font-family:var(--mono); font-size:11px;
    background:transparent; color:var(--paper);
    border:1.5px solid #46453e; padding:7px 8px; cursor:pointer;
  }
  .loop-indicator{
    font-family:var(--mono); font-size:11px; color:var(--accent);
    display:flex; align-items:center; gap:6px;
    padding:7px 10px; border:1.5px solid var(--accent-dim);
  }
  .loop-indicator .dot{width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  /* ---------- Capture bar ---------- */
  .capture{
    display:flex; gap:8px; align-items:center;
    background:var(--paper-dim); border:1.5px solid var(--ink); border-top:none;
    padding:12px; flex-wrap:wrap;
  }
  .capture .field{display:flex; flex-direction:column; gap:3px;}
  .capture label{font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:0.06em; color:#6b6a63;}
  .capture .timefield{font-family:var(--mono); font-size:13px; background:#fff; border:1.5px solid var(--ink); padding:7px 8px; width:74px; text-align:center;}
  .capture .titlefield{font-family:var(--disp); font-size:13px; background:#fff; border:1.5px solid var(--ink); padding:8px 10px; flex:1; min-width:140px;}
  .capture .endtoggle{display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; color:#6b6a63; cursor:pointer; user-select:none;}
  .capture .endtoggle input{accent-color:var(--accent);}

  /* ---------- Bookmark list ---------- */
  .index-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-top:32px; margin-bottom:12px;
    border-bottom:2px solid var(--ink); padding-bottom:8px;
  }
  .index-head h2{font-size:14px; margin:0; text-transform:uppercase; letter-spacing:0.06em; font-weight:700;}
  .index-count{font-family:var(--mono); font-size:11px; color:#6b6a63;}
  .bookmark-list{display:flex; flex-direction:column; gap:0;}
  .bookmark{
    display:grid; grid-template-columns:44px 1fr auto; gap:12px; align-items:start;
    padding:14px 10px; border-bottom:1px solid var(--line);
    transition:background .1s ease; cursor:pointer;
  }
  .bookmark:hover{background:var(--paper-dim);}
  .bookmark.is-current{background:#fff; border-left:3px solid var(--accent); padding-left:7px;}
  .bookmark-num{font-family:var(--mono); font-size:11px; color:#9a988e; padding-top:2px;}
  .bookmark-body h3{margin:0 0 3px; font-size:14px; font-weight:600;}
  .bookmark-body .desc{font-size:12px; color:#5c5b54; margin:0 0 6px; line-height:1.4;}
  .bookmark-meta{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .bookmark-meta .range{font-family:var(--mono); font-size:11px; color:var(--accent-dim); background:#fff3ee; padding:2px 6px; border:1px solid #f3c4b3;}
  .bookmark-meta .looptag{font-family:var(--mono); font-size:10px; color:var(--tape); background:#e7efe9; padding:2px 6px; border:1px solid #b9d0c0; text-transform:uppercase; letter-spacing:0.04em; cursor:pointer;}
  .bookmark-actions{display:flex; gap:6px; align-items:flex-start;}
  .empty-index{font-family:var(--mono); font-size:12px; color:#9a988e; padding:30px 10px; text-align:center; border:1.5px dashed var(--line);}

  .kbd-hint{font-family:var(--mono); font-size:10px; color:#9a988e; margin-top:18px; text-align:center; letter-spacing:0.02em;}
  .kbd-hint kbd{background:var(--paper-dim); border:1px solid var(--line); padding:1px 5px; border-radius:2px; font-family:var(--mono);}

  @media (max-width: 600px){
    .bookmark{grid-template-columns:28px 1fr;}
    .bookmark-actions{grid-column:1/-1; justify-content:flex-end; margin-top:8px;}
    .timecode{min-width:48px; font-size:12px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand" id="brandHome">
      <span class="mark">▮▮</span>
      <h1>Loopstation</h1>
    </div>
    <div class="tagline">bookmark &amp; loop tool for practice</div>
  </header>

  <!-- ============ LIBRARY VIEW ============ -->
  <div class="view active" id="libraryView">
    <div class="add-bar">
      <input id="urlInput" type="text" placeholder="Paste a YouTube link or video ID…" autocomplete="off">
      <button class="btn accent" id="addBtn">Add video</button>
    </div>
    <p class="add-error" id="addError"></p>

    <div class="lib-head">
      <h2>Your videos</h2>
      <span class="lib-count" id="libCount">0 saved</span>
    </div>
    <div id="libGrid"></div>
  </div>

  <!-- ============ PLAYER VIEW ============ -->
  <div class="view" id="playerView">
    <div class="back-row">
      <span class="back-link" id="backLink">← Library</span>
      <span class="player-title" id="playerTitle"></span>
    </div>

    <div class="deck">
      <div class="player-frame" id="playerFrame">
        <div id="ytPlayer"></div>
        <div class="deck-status" id="deckStatus">
          <div class="spinner" id="deckSpinner"></div>
          <div class="big" id="deckStatusBig">Loading player…</div>
          <div id="deckStatusSub">Connecting to YouTube</div>
        </div>
      </div>
    </div>

    <div class="transport">
      <div class="scrub-row">
        <span class="timecode" id="curTime">0:00</span>
        <div class="scrub-track">
          <div class="bookmark-ticks" id="bookmarkTicks"></div>
          <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1" disabled>
        </div>
        <span class="timecode dur" id="durTime">0:00</span>
      </div>
      <div class="transport-controls">
        <div class="group">
          <button class="btn ghost small" id="playBtn" disabled>▶ Play</button>
          <button class="btn ghost small" id="backToBookmarkBtn" disabled>⏮ Last bookmark</button>
        </div>
        <select class="speed-select" id="speedSelect" disabled>
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
        <div class="spacer"></div>
        <div class="loop-indicator" id="loopIndicator" style="display:none;">
          <span class="dot"></span> <span id="loopLabel">Looping</span>
        </div>
        <button class="btn accent small" id="markBtn" disabled>+ Bookmark here</button>
      </div>
    </div>

    <div class="capture" id="captureBar" style="display:none;">
      <div class="field">
        <label>Start</label>
        <input class="timefield" id="capStart" type="text" placeholder="0:00">
      </div>
      <label class="endtoggle">
        <input type="checkbox" id="capUseEnd">
        use end point
      </label>
      <div class="field" id="capEndField" style="display:none;">
        <label>End</label>
        <input class="timefield" id="capEnd" type="text" placeholder="0:00">
      </div>
      <div class="field" style="flex:1; min-width:140px;">
        <label>Title</label>
        <input class="titlefield" id="capTitle" type="text" placeholder="e.g. Bridge — chord change">
      </div>
      <div class="field" style="flex:2; min-width:160px;">
        <label>Description (optional)</label>
        <input class="titlefield" id="capDesc" type="text" placeholder="Notes for yourself…">
      </div>
      <button class="btn tape small" id="saveBookmarkBtn">Save</button>
      <button class="btn ghost small" id="cancelCaptureBtn">Cancel</button>
    </div>

    <div class="index-head">
      <h2>Bookmark index</h2>
      <span class="index-count" id="bookmarkCount">0 saved</span>
    </div>
    <div class="bookmark-list" id="bookmarkList"></div>

    <div class="kbd-hint">
      <kbd>space</kbd> play/pause &nbsp; <kbd>B</kbd> bookmark here &nbsp; <kbd>←</kbd>/<kbd>→</kbd> seek 5s
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ======================================================
  // YouTube IFrame API bootstrap (race-condition-safe)
  // ======================================================
  // The official pattern is: define window.onYouTubeIframeAPIReady BEFORE
  // injecting the <script> tag, because the script can call it the instant
  // it finishes loading -- which can happen before any of our own later
  // code runs. We keep a small queue of callbacks so any part of the app
  // can ask to be notified, instead of overwriting a single global handler
  // (which was the bug before: it raced and silently dropped callbacks).
  let ytApiReady = false;
  const ytApiWaiters = [];
  window.onYouTubeIframeAPIReady = function(){
    ytApiReady = true;
    while(ytApiWaiters.length) ytApiWaiters.shift()();
  };
  function whenYTReady(cb){
    if(ytApiReady && window.YT && window.YT.Player) cb();
    else ytApiWaiters.push(cb);
  }
  (function injectYTScript(){
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    s.onerror = function(){
      // Network/script load itself failed (e.g. blocked domain, offline).
      ytApiLoadFailed = true;
      if(currentVideoId) showDeckStatus('error', "Couldn't reach YouTube", "Check your internet connection and reload.");
    };
    document.head.appendChild(s);
  })();
  let ytApiLoadFailed = false;

  // ======================================================
  // State
  // ======================================================
  let player = null;
  let playerReady = false;
  let currentVideoId = null;
  let bookmarks = [];
  let activeBookmarkId = null;
  let captureMode = null;
  let scrubInterval = null;
  let isScrubbing = false;
  let loadTimeoutId = null;

  const LIB_KEY = 'loopstation_library_v1';
  const BM_PREFIX = 'loopstation_bookmarks_';

  // ======================================================
  // DOM refs
  // ======================================================
  const libraryView = document.getElementById('libraryView');
  const playerView = document.getElementById('playerView');
  const brandHome = document.getElementById('brandHome');
  const backLink = document.getElementById('backLink');
  const playerTitle = document.getElementById('playerTitle');

  const urlInput = document.getElementById('urlInput');
  const addBtn = document.getElementById('addBtn');
  const addError = document.getElementById('addError');
  const libGrid = document.getElementById('libGrid');
  const libCount = document.getElementById('libCount');

  const deckStatus = document.getElementById('deckStatus');
  const deckSpinner = document.getElementById('deckSpinner');
  const deckStatusBig = document.getElementById('deckStatusBig');
  const deckStatusSub = document.getElementById('deckStatusSub');

  const curTimeEl = document.getElementById('curTime');
  const durTimeEl = document.getElementById('durTime');
  const scrubber = document.getElementById('scrubber');
  const bookmarkTicks = document.getElementById('bookmarkTicks');
  const playBtn = document.getElementById('playBtn');
  const backToBookmarkBtn = document.getElementById('backToBookmarkBtn');
  const speedSelect = document.getElementById('speedSelect');
  const markBtn = document.getElementById('markBtn');
  const loopIndicator = document.getElementById('loopIndicator');
  const loopLabel = document.getElementById('loopLabel');

  const captureBar = document.getElementById('captureBar');
  const capStart = document.getElementById('capStart');
  const capUseEnd = document.getElementById('capUseEnd');
  const capEndField = document.getElementById('capEndField');
  const capEnd = document.getElementById('capEnd');
  const capTitle = document.getElementById('capTitle');
  const capDesc = document.getElementById('capDesc');
  const saveBookmarkBtn = document.getElementById('saveBookmarkBtn');
  const cancelCaptureBtn = document.getElementById('cancelCaptureBtn');

  const bookmarkList = document.getElementById('bookmarkList');
  const bookmarkCount = document.getElementById('bookmarkCount');

  // ======================================================
  // Helpers
  // ======================================================
  function extractVideoId(input){
    input = (input || '').trim();
    if(/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
    try{
      const u = new URL(input);
      if(u.hostname.includes('youtu.be')) return u.pathname.slice(1, 12);
      if(u.hostname.includes('youtube.com')){
        if(u.searchParams.get('v')) return u.searchParams.get('v');
        const m = u.pathname.match(/\/(embed|shorts|live)\/([a-zA-Z0-9_-]{11})/);
        if(m) return m[2];
      }
    }catch(e){ /* not a full URL, fall through */ }
    const m2 = input.match(/[a-zA-Z0-9_-]{11}/);
    return m2 ? m2[0] : null;
  }

  function fmtTime(sec){
    sec = Math.max(0, Math.floor(sec || 0));
    const h = Math.floor(sec/3600);
    const m = Math.floor((sec%3600)/60);
    const s = sec%60;
    if(h>0) return h+":"+String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
    return m+":"+String(s).padStart(2,'0');
  }

  function parseTime(str){
    if(str == null) return null;
    str = str.trim();
    if(str === '') return null;
    const parts = str.split(':').map(p=>p.trim());
    if(parts.some(p => p === '' || isNaN(Number(p)))) return null;
    let sec = 0;
    if(parts.length === 3) sec = Number(parts[0])*3600 + Number(parts[1])*60 + Number(parts[2]);
    else if(parts.length === 2) sec = Number(parts[0])*60 + Number(parts[1]);
    else if(parts.length === 1) sec = Number(parts[0]);
    else return null;
    return sec;
  }

  function genId(prefix){ return (prefix||'id') + '_' + Date.now() + '_' + Math.floor(Math.random()*10000); }

  // ======================================================
  // Library persistence
  // ======================================================
  function loadLibrary(){
    try{
      const raw = localStorage.getItem(LIB_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveLibrary(lib){
    localStorage.setItem(LIB_KEY, JSON.stringify(lib));
  }
  function upsertLibraryEntry(entry){
    const lib = loadLibrary();
    const idx = lib.findIndex(v => v.videoId === entry.videoId);
    if(idx >= 0) lib[idx] = Object.assign({}, lib[idx], entry);
    else lib.push(entry);
    saveLibrary(lib);
    return lib;
  }
  function removeLibraryEntry(videoId){
    const lib = loadLibrary().filter(v => v.videoId !== videoId);
    saveLibrary(lib);
    localStorage.removeItem(BM_PREFIX + videoId);
    return lib;
  }
  function bookmarkKey(videoId){ return BM_PREFIX + videoId; }
  function loadBookmarksFor(videoId){
    try{
      const raw = localStorage.getItem(bookmarkKey(videoId));
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveBookmarksFor(videoId, list){
    localStorage.setItem(bookmarkKey(videoId), JSON.stringify(list));
  }

  // ======================================================
  // VIEW SWITCHING
  // ======================================================
  function showLibrary(){
    teardownPlayer();
    playerView.classList.remove('active');
    libraryView.classList.add('active');
    renderLibrary();
  }
  function showPlayer(videoId, title){
    libraryView.classList.remove('active');
    playerView.classList.add('active');
    openVideo(videoId, title);
  }
  brandHome.addEventListener('click', showLibrary);
  backLink.addEventListener('click', showLibrary);

  // ======================================================
  // LIBRARY VIEW rendering
  // ======================================================
  function renderLibrary(){
    const lib = loadLibrary().slice().sort((a,b)=> (b.lastOpened||0) - (a.lastOpened||0));
    libCount.textContent = lib.length + (lib.length === 1 ? ' saved' : ' saved');

    if(lib.length === 0){
      libGrid.innerHTML = '<div class="empty-lib"><div class="big">No videos yet</div>Paste a YouTube link above to start your first practice session.</div>';
      return;
    }

    libGrid.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'lib-grid';

    lib.forEach(entry=>{
      const bmCount = loadBookmarksFor(entry.videoId).length;
      const card = document.createElement('div');
      card.className = 'lib-card';

      const thumb = document.createElement('div');
      thumb.className = 'lib-thumb';
      thumb.style.backgroundImage = "url('https://i.ytimg.com/vi/" + entry.videoId + "/mqdefault.jpg')";
      if(bmCount > 0){
        const badge = document.createElement('span');
        badge.className = 'bm-badge';
        badge.textContent = bmCount + (bmCount === 1 ? ' bookmark' : ' bookmarks');
        thumb.appendChild(badge);
      }

      const body = document.createElement('div');
      body.className = 'lib-body';
      const titleEl = document.createElement('div');
      titleEl.className = 'lib-title';
      titleEl.textContent = entry.title || entry.videoId;
      const meta = document.createElement('div');
      meta.className = 'lib-meta';
      meta.textContent = entry.videoId;

      const actions = document.createElement('div');
      actions.className = 'lib-actions';
      const renameBtn = document.createElement('button');
      renameBtn.className = 'icon-btn';
      renameBtn.title = 'Rename';
      renameBtn.textContent = '✎';
      renameBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const next = prompt('Rename this video', entry.title || entry.videoId);
        if(next != null && next.trim() !== ''){
          upsertLibraryEntry({ videoId: entry.videoId, title: next.trim() });
          renderLibrary();
        }
      });
      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn danger';
      delBtn.title = 'Remove';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(confirm('Remove "' + (entry.title || entry.videoId) + '" and all its bookmarks?')){
          removeLibraryEntry(entry.videoId);
          renderLibrary();
        }
      });
      actions.appendChild(renameBtn);
      actions.appendChild(delBtn);

      body.appendChild(titleEl);
      body.appendChild(meta);
      body.appendChild(actions);
      card.appendChild(thumb);
      card.appendChild(body);

      card.addEventListener('click', ()=>{
        showPlayer(entry.videoId, entry.title);
      });

      grid.appendChild(card);
    });

    libGrid.appendChild(grid);
  }

  function tryFetchTitle(videoId){
    // Best-effort: YouTube's oEmbed endpoint gives us a real title without
    // needing an API key. If it fails (offline, blocked, etc.) we just
    // keep the fallback title already stored -- never block on this.
    fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=' + videoId + '&format=json')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if(data && data.title){
          upsertLibraryEntry({ videoId: videoId, title: data.title });
          if(currentVideoId === videoId){
            playerTitle.textContent = data.title;
          }
          if(libraryView.classList.contains('active')) renderLibrary();
        }
      })
      .catch(()=>{ /* ignore, fallback title stands */ });
  }

  function handleAdd(){
    addError.textContent = '';
    const id = extractVideoId(urlInput.value);
    if(!id){
      addError.textContent = "That doesn't look like a YouTube link or video ID.";
      urlInput.style.borderColor = 'var(--accent)';
      setTimeout(()=>{ urlInput.style.borderColor = ''; }, 900);
      return;
    }
    const lib = loadLibrary();
    const existing = lib.find(v => v.videoId === id);
    const entry = {
      videoId: id,
      title: (existing && existing.title) || ('Video ' + id),
      lastOpened: existing ? existing.lastOpened : Date.now()
    };
    upsertLibraryEntry(entry);
    tryFetchTitle(id);
    urlInput.value = '';
    showPlayer(id, entry.title);
  }
  addBtn.addEventListener('click', handleAdd);
  urlInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') handleAdd(); });

  // ======================================================
  // PLAYER VIEW: deck status (loading / error)
  // ======================================================
  function showDeckStatus(kind, big, sub){
    // kind: 'loading' | 'error'
    deckStatus.hidden = false;
    deckStatus.classList.toggle('is-error', kind === 'error');
    deckSpinner.style.display = kind === 'loading' ? 'block' : 'none';
    deckStatusBig.textContent = big;
    deckStatusSub.textContent = sub || '';
  }
  function hideDeckStatus(){
    deckStatus.hidden = true;
  }

  // ======================================================
  // PLAYER VIEW: open a video
  // ======================================================
  function openVideo(videoId, titleHint){
    currentVideoId = videoId;
    activeBookmarkId = null;
    captureMode = null;
    playerReady = false;
    loopIndicator.style.display = 'none';
    captureBar.style.display = 'none';

    playerTitle.textContent = titleHint || videoId;
    bookmarks = loadBookmarksFor(videoId);
    renderBookmarkList();

    scrubber.disabled = true;
    playBtn.disabled = true;
    backToBookmarkBtn.disabled = true;
    speedSelect.disabled = true;
    markBtn.disabled = true;
    curTimeEl.textContent = '0:00';
    durTimeEl.textContent = '0:00';
    scrubber.value = 0;

    upsertLibraryEntry({ videoId: videoId, lastOpened: Date.now() });

    showDeckStatus('loading', 'Loading player…', 'Connecting to YouTube');

    if(ytApiLoadFailed){
      showDeckStatus('error', "Couldn't reach YouTube", 'Check your internet connection and try again.');
      return;
    }

    // Safety net: if neither onReady nor onError fires within 12s
    // (e.g. silently blocked network request), tell the user instead
    // of leaving them staring at an endless spinner.
    if(loadTimeoutId) clearTimeout(loadTimeoutId);
    loadTimeoutId = setTimeout(()=>{
      if(!playerReady){
        showDeckStatus('error', 'This is taking too long', 'YouTube may be unreachable, or this video can\u2019t be embedded. Try reloading.');
      }
    }, 12000);

    whenYTReady(()=> createPlayer(videoId));
  }

  function teardownPlayer(){
    if(scrubInterval){ clearInterval(scrubInterval); scrubInterval = null; }
    if(loadTimeoutId){ clearTimeout(loadTimeoutId); loadTimeoutId = null; }
    if(player && typeof player.destroy === 'function'){
      try{ player.destroy(); }catch(e){}
    }
    player = null;
    playerReady = false;
  }

  function createPlayer(videoId){
    if(player && typeof player.destroy === 'function'){
      try{ player.destroy(); }catch(e){}
    }
    try{
      player = new YT.Player('ytPlayer', {
        videoId: videoId,
        playerVars: { autoplay: 0, rel: 0, modestbranding: 1, playsinline: 1 },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: onPlayerError
        }
      });
    }catch(e){
      showDeckStatus('error', "Couldn't load this video", 'Something went wrong starting the player.');
    }
  }

  function onPlayerReady(){
    if(currentVideoId == null) return; // user navigated away before this fired
    playerReady = true;
    if(loadTimeoutId){ clearTimeout(loadTimeoutId); loadTimeoutId = null; }
    hideDeckStatus();
    scrubber.disabled = false;
    playBtn.disabled = false;
    backToBookmarkBtn.disabled = false;
    speedSelect.disabled = false;
    markBtn.disabled = false;
    const dur = player.getDuration() || 0;
    durTimeEl.textContent = fmtTime(dur);
    scrubber.max = dur || 100;
    startScrubTimer();
    renderTicks();
  }

  function onPlayerError(e){
    // YT error codes: 2 invalid param, 5 HTML5 error, 100 not found/removed,
    // 101/150 embedding disabled by uploader.
    if(loadTimeoutId){ clearTimeout(loadTimeoutId); loadTimeoutId = null; }
    let msg = 'Something went wrong playing this video.';
    if(e && (e.data === 101 || e.data === 150)) msg = 'The video owner has disabled playback on other sites.';
    else if(e && e.data === 100) msg = 'This video is private or has been removed.';
    else if(e && e.data === 2) msg = "That video ID doesn't look valid.";
    showDeckStatus('error', "Can't play this video", msg);
  }

  function onPlayerStateChange(e){
    if(e.data === YT.PlayerState.PLAYING) playBtn.textContent = '⏸ Pause';
    else playBtn.textContent = '▶ Play';
  }

  function startScrubTimer(){
    if(scrubInterval) clearInterval(scrubInterval);
    scrubInterval = setInterval(()=>{
      if(!playerReady || isScrubbing || !player) return;
      const t = player.getCurrentTime();
      curTimeEl.textContent = fmtTime(t);
      scrubber.value = t;
      checkLoop(t);
    }, 200);
  }

  function checkLoop(t){
    if(activeBookmarkId == null) return;
    const bm = bookmarks.find(b => b.id === activeBookmarkId);
    if(!bm || bm.end == null) return;
    if(t >= bm.end - 0.15){
      if(bm.loop) player.seekTo(bm.start, true);
      else { player.pauseVideo(); player.seekTo(bm.end, true); }
    }
  }

  // ======================================================
  // Transport controls
  // ======================================================
  playBtn.addEventListener('click', ()=>{
    if(!playerReady) return;
    const state = player.getPlayerState();
    if(state === YT.PlayerState.PLAYING) player.pauseVideo();
    else player.playVideo();
  });

  scrubber.addEventListener('input', ()=>{
    isScrubbing = true;
    curTimeEl.textContent = fmtTime(scrubber.value);
  });
  scrubber.addEventListener('change', ()=>{
    if(playerReady) player.seekTo(Number(scrubber.value), true);
    isScrubbing = false;
  });

  speedSelect.addEventListener('change', ()=>{
    if(playerReady) player.setPlaybackRate(Number(speedSelect.value));
  });

  backToBookmarkBtn.addEventListener('click', jumpToActiveOrLast);

  function jumpToActiveOrLast(){
    let bm = null;
    if(activeBookmarkId != null) bm = bookmarks.find(b => b.id === activeBookmarkId);
    if(!bm && bookmarks.length > 0) bm = bookmarks[bookmarks.length - 1];
    if(!bm || !playerReady) return;
    activeBookmarkId = bm.id;
    player.seekTo(bm.start, true);
    player.playVideo();
    updateLoopIndicator(bm);
    renderBookmarkList();
  }

  function updateLoopIndicator(bm){
    if(bm && bm.end != null && bm.loop){
      loopIndicator.style.display = 'flex';
      loopLabel.textContent = 'Looping: ' + bm.title;
    } else {
      loopIndicator.style.display = 'none';
    }
  }

  // ======================================================
  // Capture bar (create + edit)
  // ======================================================
  markBtn.addEventListener('click', ()=>{
    if(!playerReady) return;
    captureMode = null;
    const t = player.getCurrentTime();
    capStart.value = fmtTime(t);
    capUseEnd.checked = false;
    capEndField.style.display = 'none';
    capEnd.value = '';
    capTitle.value = '';
    capDesc.value = '';
    captureBar.style.display = 'flex';
    capTitle.focus();
  });

  capUseEnd.addEventListener('change', ()=>{
    capEndField.style.display = capUseEnd.checked ? 'flex' : 'none';
    if(capUseEnd.checked && !capEnd.value && playerReady) capEnd.value = fmtTime(player.getCurrentTime());
  });

  cancelCaptureBtn.addEventListener('click', ()=>{
    captureBar.style.display = 'none';
    captureMode = null;
  });

  saveBookmarkBtn.addEventListener('click', ()=>{
    const start = parseTime(capStart.value);
    if(start == null){
      capStart.style.borderColor = 'var(--accent)';
      setTimeout(()=>{ capStart.style.borderColor = ''; }, 900);
      return;
    }
    let end = null;
    if(capUseEnd.checked){
      end = parseTime(capEnd.value);
      if(end == null || end <= start){
        capEnd.style.borderColor = 'var(--accent)';
        setTimeout(()=>{ capEnd.style.borderColor = ''; }, 900);
        return;
      }
    }
    const title = capTitle.value.trim() || ('Bookmark at ' + fmtTime(start));
    const desc = capDesc.value.trim();

    if(captureMode){
      captureMode.start = start;
      captureMode.end = end;
      if(end == null) captureMode.loop = false;
      captureMode.title = capTitle.value.trim() || captureMode.title;
      captureMode.desc = desc;
    } else {
      bookmarks.push({ id: genId('bm'), start: start, end: end, loop: end != null, title: title, desc: desc });
    }
    bookmarks.sort((a,b)=>a.start-b.start);
    saveBookmarksFor(currentVideoId, bookmarks);
    renderBookmarkList();
    renderTicks();
    captureBar.style.display = 'none';
    captureMode = null;
  });

  function openEdit(bm){
    captureMode = bm;
    capStart.value = fmtTime(bm.start);
    capUseEnd.checked = bm.end != null;
    capEndField.style.display = capUseEnd.checked ? 'flex' : 'none';
    capEnd.value = bm.end != null ? fmtTime(bm.end) : '';
    capTitle.value = bm.title;
    capDesc.value = bm.desc || '';
    captureBar.style.display = 'flex';
    capTitle.focus();
  }

  // ======================================================
  // Bookmark list rendering
  // ======================================================
  function renderBookmarkList(){
    bookmarkCount.textContent = bookmarks.length + ' saved';
    if(bookmarks.length === 0){
      bookmarkList.innerHTML = '<div class="empty-index">No bookmarks yet for this video. Play it, hit "+ Bookmark here," and start marking the spots you want to drill.</div>';
      return;
    }
    bookmarkList.innerHTML = '';
    bookmarks.forEach((bm, idx)=>{
      const row = document.createElement('div');
      row.className = 'bookmark' + (bm.id === activeBookmarkId ? ' is-current' : '');

      const num = document.createElement('div');
      num.className = 'bookmark-num';
      num.textContent = String(idx+1).padStart(2,'0');

      const body = document.createElement('div');
      body.className = 'bookmark-body';
      const h3 = document.createElement('h3');
      h3.textContent = bm.title;
      body.appendChild(h3);
      if(bm.desc){
        const p = document.createElement('p');
        p.className = 'desc';
        p.textContent = bm.desc;
        body.appendChild(p);
      }
      const meta = document.createElement('div');
      meta.className = 'bookmark-meta';
      const range = document.createElement('span');
      range.className = 'range';
      range.textContent = bm.end != null ? (fmtTime(bm.start) + ' → ' + fmtTime(bm.end)) : fmtTime(bm.start);
      meta.appendChild(range);
      if(bm.end != null){
        const loopTag = document.createElement('span');
        loopTag.className = 'looptag';
        loopTag.textContent = bm.loop ? 'loop on' : 'loop off';
        loopTag.title = 'Click to toggle looping';
        loopTag.addEventListener('click', (e)=>{
          e.stopPropagation();
          bm.loop = !bm.loop;
          saveBookmarksFor(currentVideoId, bookmarks);
          renderBookmarkList();
          if(bm.id === activeBookmarkId) updateLoopIndicator(bm);
        });
        meta.appendChild(loopTag);
      }
      body.appendChild(meta);

      const actions = document.createElement('div');
      actions.className = 'bookmark-actions';
      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn';
      editBtn.title = 'Edit';
      editBtn.textContent = '✎';
      editBtn.addEventListener('click', (e)=>{ e.stopPropagation(); openEdit(bm); });
      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn danger';
      delBtn.title = 'Delete';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        bookmarks = bookmarks.filter(b => b.id !== bm.id);
        if(activeBookmarkId === bm.id) activeBookmarkId = null;
        saveBookmarksFor(currentVideoId, bookmarks);
        renderBookmarkList();
        renderTicks();
      });
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);

      row.appendChild(num);
      row.appendChild(body);
      row.appendChild(actions);

      row.addEventListener('click', ()=>{
        if(!playerReady) return;
        activeBookmarkId = bm.id;
        player.seekTo(bm.start, true);
        player.playVideo();
        updateLoopIndicator(bm);
        renderBookmarkList();
      });

      bookmarkList.appendChild(row);
    });
  }

  function renderTicks(){
    bookmarkTicks.innerHTML = '';
    if(!playerReady || !player) return;
    const dur = player.getDuration();
    if(!dur) return;
    bookmarks.forEach(bm=>{
      const tick = document.createElement('div');
      tick.className = 'tick' + (bm.end != null && bm.loop ? ' active-loop' : '');
      tick.style.left = (bm.start/dur*100) + '%';
      tick.title = bm.title;
      bookmarkTicks.appendChild(tick);
    });
  }

  // ======================================================
  // Keyboard shortcuts (player view only)
  // ======================================================
  document.addEventListener('keydown', (e)=>{
    if(e.target.tagName === 'INPUT') return;
    if(!playerView.classList.contains('active')) return;
    if(!playerReady) return;
    if(e.code === 'Space'){
      e.preventDefault();
      const state = player.getPlayerState();
      if(state === YT.PlayerState.PLAYING) player.pauseVideo();
      else player.playVideo();
    } else if(e.key === 'b' || e.key === 'B'){
      markBtn.click();
    } else if(e.key === 'ArrowRight'){
      player.seekTo(player.getCurrentTime() + 5, true);
    } else if(e.key === 'ArrowLeft'){
      player.seekTo(Math.max(0, player.getCurrentTime() - 5), true);
    }
  });

  // ======================================================
  // Init
  // ======================================================
  renderLibrary();

})();
</script>
</body>
</html>
